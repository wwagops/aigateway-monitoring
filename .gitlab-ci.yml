default:
  image: python:3.12-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Une seule pipeline par MR / branche par défaut / tag (évite les doublons).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - quality
  - test

# Base réutilisable : cache pip + installation du paquet + deps dev.
.deps:
  cache:
    key:
      files:
        - pyproject.toml
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"

ruff:
  stage: quality
  extends: .deps
  script:
    - ruff check .

mypy:
  stage: quality
  extends: .deps
  script:
    - mypy src

pytest:
  stage: test
  extends: .deps
  image: python:${PY}-slim
  parallel:
    matrix:
      - PY: ["3.11", "3.12", "3.13"]
  script:
    - pytest -q

# Job d'intégration : migrations Alembic contre un vrai PostgreSQL.
migrations:
  stage: test
  extends: .deps
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: aigw
    POSTGRES_PASSWORD: aigw
    POSTGRES_DB: aigw
    AIGW_DATABASE_URL: "postgresql+asyncpg://aigw:aigw@postgres:5432/aigw"
  script:
    - alembic upgrade head
    - alembic downgrade base
    - alembic upgrade head
